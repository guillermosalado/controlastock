<!-- ══════════════════════════════════════════════════════
     vista: ventas.html  →  /views/shared/ventas.html
     Inyectada en: #vistaContenido
     Datos: ventasController.js (cargado en index.html)
     ══════════════════════════════════════════════════════ -->

<div class="dash-wrapper vista-fade">

    <!-- ── Encabezado ──────────────────────────────────── -->
    <div class="dash-vista-header">
        <div>
            <h2 class="dash-titulo">Ventas</h2>
            <p class="dash-fecha" id="ven-subtitulo">Punto de venta e historial</p>
        </div>
        <button class="btn-nuevo-usuario" id="btnNuevaVenta">
            <i class="fas fa-plus"></i>
            Nueva venta
        </button>
    </div>

    <!-- ── Filtros ──────────────────────────────────────── -->
    <div class="inv-filtros stat-card" style="padding:1rem 1.4rem">
        <div class="inv-filtros-row">
            <div class="inv-search-wrap">
                <i class="fas fa-search inv-search-icon"></i>
                <input type="text" id="ven-buscar" class="usu-input inv-search-input"
                       placeholder="Buscar por folio...">
            </div>
            <select id="ven-filtro-estado" class="usu-input inv-select">
                <option value="">Todos los estados</option>
                <option value="completada">Completada</option>
                <option value="cancelada">Cancelada</option>
                <option value="pendiente">Pendiente</option>
            </select>
            <input type="date" id="ven-filtro-desde" class="usu-input inv-select"
                   title="Fecha desde">
            <input type="date" id="ven-filtro-hasta" class="usu-input inv-select"
                   title="Fecha hasta">
            <button class="btn-inv-movimientos" id="btnBuscarVentas">
                <i class="fas fa-filter"></i> Filtrar
            </button>
        </div>
    </div>

    <!-- ── Tabla historial ──────────────────────────────── -->
    <div class="stat-card dash-panel">
        <div id="ven-skeleton">
            <div class="dash-skeleton"></div>
            <div class="dash-skeleton" style="width:85%"></div>
            <div class="dash-skeleton" style="width:70%"></div>
        </div>
        <div id="ven-tabla" style="display:none">
            <div class="usu-table-wrapper">
                <table class="usu-table">
                    <thead>
                        <tr>
                            <th>Folio</th>
                            <th>Fecha</th>
                            <th>Vendedor</th>
                            <th>Método pago</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="ven-tbody"></tbody>
                </table>
            </div>
        </div>
        <p id="ven-vacio"
           style="display:none;color:#7a8a9a;text-align:center;padding:2rem">
            No hay ventas registradas aún.
        </p>

        <!-- ── Paginación ───────────────────────────────── -->
        <div id="ven-paginacion"
             style="display:none;display:flex;gap:0.5rem;justify-content:center;
                    align-items:center;padding:1rem 0;flex-wrap:wrap">
        </div>
    </div>

</div>

<!-- ══ MODAL — Nueva venta (POS) ═══════════════════════ -->
<div class="usu-modal-overlay" id="venModal" style="display:none">
    <div class="usu-modal-card" style="max-width:700px">
        <div class="usu-modal-header">
            <h5 class="usu-modal-titulo">Nueva Venta</h5>
            <button class="usu-modal-close" id="btnCerrarVenModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="usu-modal-body" style="gap:1rem">

            <!-- Buscador de productos -->
            <div class="inv-search-wrap" style="position:relative">
                <i class="fas fa-search inv-search-icon"></i>
                <input type="text" id="ven-prod-buscar" class="usu-input inv-search-input"
                       placeholder="Buscar producto por nombre o código..."
                       autocomplete="off">
                <!-- Dropdown resultados -->
                <div id="ven-prod-dropdown"
                     style="display:none;position:absolute;top:100%;left:0;right:0;
                            background:#fff;border:1px solid #dce3ea;border-radius:8px;
                            box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:999;
                            max-height:220px;overflow-y:auto;margin-top:4px">
                </div>
            </div>

            <!-- Carrito -->
            <div style="min-height:120px">
                <div id="ven-carrito-vacio"
                     style="text-align:center;color:#7a8a9a;padding:2rem 0;font-size:.9rem">
                    <i class="fas fa-shopping-cart" style="font-size:1.8rem;opacity:.3;display:block;margin-bottom:.5rem"></i>
                    Agrega productos para comenzar
                </div>
                <div id="ven-carrito-tabla" style="display:none">
                    <div class="usu-table-wrapper" style="max-height:240px;overflow-y:auto">
                        <table class="usu-table">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th style="width:100px">Cantidad</th>
                                    <th style="width:110px">Precio</th>
                                    <th style="width:100px">Subtotal</th>
                                    <th style="width:40px"></th>
                                </tr>
                            </thead>
                            <tbody id="ven-carrito-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Totales + método pago -->
            <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;
                        border-top:1px solid #dce3ea;padding-top:1rem">
                <div class="usu-form-group" style="flex:1;min-width:160px">
                    <label>Método de pago</label>
                    <select id="ven-metodo-pago" class="usu-input">
                        <option value="efectivo"> Efectivo</option>
                        <option value="tarjeta"> Tarjeta</option>
                        <option value="transferencia"> Transferencia</option>
                    </select>
                </div>
                <div class="usu-form-group" style="flex:1;min-width:160px">
                    <label>Observaciones</label>
                    <input type="text" id="ven-observaciones" class="usu-input"
                           placeholder="Opcional">
                </div>
                <div style="text-align:right;min-width:140px">
                    <p style="margin:0;font-size:.82rem;color:#7a8a9a">Total a cobrar</p>
                    <p id="ven-total-display"
                       style="margin:0;font-size:1.7rem;font-weight:800;
                              color:var(--color-pri)">$0.00</p>
                </div>
            </div>

            <p id="ven-modal-error"
               style="display:none;color:#dc3545;font-size:.85rem;margin:0"></p>
        </div>
        <div class="usu-modal-footer">
            <button class="usu-btn-cancelar" id="btnCancelarVenModal">Cancelar</button>
            <button class="usu-btn-guardar" id="btnConfirmarVenta">
                <i class="fas fa-check"></i> Confirmar venta
            </button>
        </div>
    </div>
</div>

<!-- ══ MODAL — Detalle de venta ════════════════════════ -->
<div class="usu-modal-overlay" id="venDetalleModal" style="display:none">
    <div class="usu-modal-card" style="max-width:580px">
        <div class="usu-modal-header">
            <h5 class="usu-modal-titulo" id="ven-detalle-titulo">Detalle de venta</h5>
            <button class="usu-modal-close" id="btnCerrarDetalleModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="usu-modal-body" id="ven-detalle-body"
             style="max-height:65vh;overflow-y:auto;gap:0.75rem">
            <div id="ven-detalle-skeleton">
                <div class="dash-skeleton"></div>
                <div class="dash-skeleton" style="width:80%"></div>
                <div class="dash-skeleton" style="width:65%"></div>
            </div>
            <div id="ven-detalle-contenido" style="display:none"></div>
        </div>
        <div class="usu-modal-footer">
            <button class="usu-btn-cancelar" id="btnCerrarDetalleFooter">Cerrar</button>
            <button class="usu-btn-guardar danger" id="btnCancelarVenta"
                    style="display:none;background:#dc3545">
                <i class="fas fa-ban"></i> Cancelar venta
            </button>
        </div>
    </div>
</div>

<!-- ══ MODAL — Ticket / Confirmación ═══════════════════ -->
<div class="usu-modal-overlay" id="venTicketModal" style="display:none">
    <div class="usu-modal-card" style="max-width:380px">
        <div class="usu-modal-header">
            <h5 class="usu-modal-titulo">¡Venta registrada!</h5>
            <button class="usu-modal-close" id="btnCerrarTicket">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="usu-modal-body" style="align-items:center;text-align:center;gap:.75rem">
            <div style="width:64px;height:64px;border-radius:50%;background:#e8f5e9;
                        display:flex;align-items:center;justify-content:center;margin:0 auto">
                <i class="fas fa-check-circle" style="font-size:2rem;color:#28a745"></i>
            </div>
            <p id="ticket-folio"
               style="font-size:1.1rem;font-weight:800;color:var(--color-pri);margin:0"></p>
            <p id="ticket-total"
               style="font-size:2rem;font-weight:800;margin:0;color:#1a2340"></p>
            <p id="ticket-metodo"
               style="font-size:.9rem;color:#7a8a9a;margin:0"></p>
            <p id="ticket-items"
               style="font-size:.85rem;color:#7a8a9a;margin:0"></p>
        </div>
        <div class="usu-modal-footer">
            <button class="usu-btn-guardar" id="btnTicketNuevaVenta"
                    style="width:100%;justify-content:center">
                <i class="fas fa-plus"></i> Nueva venta
            </button>
        </div>
    </div>
</div>

<script>initVentas();</script>
