<div class="dash-wrapper vista-fade">

    <!-- ── Encabezado ──────────────────────────────────── -->
    <div class="dash-vista-header">
        <div>
            <h2 class="dash-titulo">Proveedores</h2>
            <p class="dash-fecha">Gestión de proveedores de tu tienda</p>
        </div>
        <button class="btn-nuevo-usuario" id="btnNuevoProveedor">
            <i class="fas fa-plus"></i>
            Nuevo proveedor
        </button>
    </div>

    <!-- ── Tabla proveedores ─────────────────────────────── -->

        <div id="prov-skeleton">
            <div class="dash-skeleton"></div>

            <div class="dash-skeleton" style="width:75%"></div>

        <div id="prov-tabla" style="display:none">

                <table class="usu-table">
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Contacto</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="prov-tbody"></tbody>
                </table>
            </div>
        </div>
        <p id="prov-vacio" style="display:none;color:#7a8a9a;text-align:center;padding:2rem">
            No hay proveedores registrados aún.
        </p>
    </div>

</div>
